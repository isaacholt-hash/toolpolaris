[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, stale-while-revalidate=604800, durable, must-revalidate"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cannibalization fixes — 301 redirects to canonical pages
# SEO cluster: seo-ai-tools and ai-tools-for-seo -> best-ai-seo-tools
[[redirects]]
  from = "/tools/seo-ai-tools"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

[[redirects]]
  from = "/tools/seo-ai-tools/"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

[[redirects]]
  from = "/tools/ai-tools-for-seo"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

[[redirects]]
  from = "/tools/ai-tools-for-seo/"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

