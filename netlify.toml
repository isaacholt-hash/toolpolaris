[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cannibalization fixes — 301 redirects to canonical pages
# SEO cluster: seo-ai-tools and ai-tools-for-seo -> best-ai-seo-tools
[[redirects]]
  from = "/tools/seo-ai-tools"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

[[redirects]]
  from = "/tools/seo-ai-tools/"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

[[redirects]]
  from = "/tools/ai-tools-for-seo"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

[[redirects]]
  from = "/tools/ai-tools-for-seo/"
  to   = "/tools/best-ai-seo-tools/"
  status = 301
  force  = true

